services:
  # MongoDB 数据库
  mongodb:
    image: m.daocloud.io/docker.io/library/mongo:7  # 如拉取失败可改用 m.daocloud.io/docker.io/library/mongo:7
    container_name: mbri-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    # 端口不暴露到宿主机，仅 Docker 网络内部访问
    # ports:
    #   - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mbri-website
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 后端 API 服务
  backend:
    build: ./server
    container_name: mbri-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # 前端静态服务 (Nginx)
  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    container_name: mbri-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongodb-data:
